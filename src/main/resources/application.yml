server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    h2:
      console:
        enabled: true

logging:
  level:
    root: INFO

app:
  storage-dir: ./storage

management:
  endpoints:
    web:
      exposure:
        include: health, info
